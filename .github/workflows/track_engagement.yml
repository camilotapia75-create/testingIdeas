name: Track Ad Engagement

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC — scores yesterday's videos after 28hrs
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install tweepy

      - name: Pull engagement metrics
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python track_engagement.py

      - name: Commit updated scores
        run: |
          git config user.name "Ad Agent"
          git config user.email "ad-agent@noreply.github.com"
          git add performance.json tweet_log.json
          git diff --cached --quiet || git commit -m "perf: auto-scored engagement $(date -u +%Y-%m-%d)"
          git push
