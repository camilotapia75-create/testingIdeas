name: Nightly Video Ad Generation

on:
  # PAUSED -- re-enable the schedule line below when you're ready to go live
  # schedule:
  #   - cron: '0 2 * * *'  # 2am UTC every night
  workflow_dispatch:  # Manual trigger only for now

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic fal-client tweepy

      - name: Generate videos and post to Twitter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python generate_video_ads.py

      - name: Commit results
        run: |
          git config user.name "Ad Agent"
          git config user.email "ad-agent@noreply.github.com"
          git add ads/ tweet_log.json
          git diff --cached --quiet || git commit -m "chore: video ads posted $(date -u +%Y-%m-%d)"
          git push
